# 生产环境配置
# 请根据实际生产环境修改以下配置
# 重要：JASYPT_PASSWORD 必须通过环境变量注入，不要写在配置文件中
server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    threads:
      max: 400
      min-spare: 20
    max-connections: 10000
    accept-count: 200
    uri-encoding: UTF-8

spring:
  datasource:
    url: jdbc:postgresql://PROD_HOST:5432/PROD_DB?useUnicode=true&characterEncoding=utf-8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ENC(REPLACE_WITH_ENCRYPTED_USERNAME)
    password: ENC(REPLACE_WITH_ENCRYPTED_PASSWORD)
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

decorator:
  datasource:
    p6spy:
      enabled: false

springdoc:
  api-docs:
    enabled: false

jwt:
  secret: REPLACE_WITH_YOUR_PRODUCTION_JWT_SECRET_KEY
  expiration: 86400000

cors:
  allowed-origins: "https://your-production-domain.com"

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD}
