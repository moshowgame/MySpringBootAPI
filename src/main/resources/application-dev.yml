      web-stat-filter:
        enabled: true
        url-pattern: "/*"
        exclusions: "*.js,*.gif,*.jpg,*.bmp,*.png,*.css,*.ico,/druid/*,/system/druid/*"
      stat-view-servlet:
        enabled: true
        url-pattern: "/system/druid/*"
        allow: 127.0.0.1
        deny:
        reset-enable: false
        login-username: admin
        login-password: ENC(KOqROucOnAKqiYNZCy8tjA==)

